name: design_system
description: "Tokens, thèmes, composants et layouts partagés (sans métier)."
version: 0.0.1
publish_to: 'none'
resolution: workspace

environment:
  sdk: ^3.10.4
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  # Police serif de marque embarquée (licence Open Font). Fournie en asset pour
  # un rendu identique hors ligne — google_fonts la détecte et évite tout
  # téléchargement réseau au lancement (essentiel en contexte d'urgence).
  fonts:
    - family: Gelasio
      fonts:
        - asset: assets/fonts/Gelasio-Regular.ttf
          weight: 400
        - asset: assets/fonts/Gelasio-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Gelasio-Bold.ttf
          weight: 700
