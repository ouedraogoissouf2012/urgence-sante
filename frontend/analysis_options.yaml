# Règles d'analyse partagées par toutes les applications et packages du workspace.
# Chaque membre inclut ce fichier via « include: ../../analysis_options.yaml ».
include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # Une importation d'une autre application est interdite (isolation des apps).
    # Renforcé par l'absence de dépendance croisée dans les pubspec.
    todo: ignore

linter:
  rules:
    - always_declare_return_types
    - avoid_print
    - directives_ordering
    - prefer_const_constructors
    - prefer_final_locals
    - require_trailing_commas
    - unawaited_futures
    - use_key_in_widget_constructors
