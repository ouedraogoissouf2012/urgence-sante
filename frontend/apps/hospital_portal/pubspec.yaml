name: hospital_portal
description: "Portail hospitalier — saisie de disponibilité (Web)."
publish_to: 'none'
version: 1.0.0+1
resolution: workspace

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Injection et observation d'état (ADR-003).
  flutter_riverpod: ^3.0.0
  # Format des horodatages affichés.
  intl: any
  app_foundation:
    path: ../../packages/app_foundation
  design_system:
    path: ../../packages/design_system
  api_client:
    path: ../../packages/api_client

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  testing_support:
    path: ../../packages/testing_support

flutter:
  uses-material-design: true
