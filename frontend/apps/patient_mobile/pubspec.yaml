name: patient_mobile
description: "Application patient — orientation d'urgence (Lot 1, Android)."
publish_to: 'none'
version: 1.0.0+1
resolution: workspace

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Injection et observation d'état (ADR-003).
  flutter_riverpod: ^3.0.0
  # Carte OpenStreetMap et position (Lot 1).
  flutter_map: ^8.2.0
  latlong2: ^0.9.1
  geolocator: ^14.0.0
  # Appels d'urgence (tel:).
  url_launcher: ^6.3.0
  # Persistance locale du consentement (version des conditions acceptée).
  shared_preferences: ^2.3.0
  app_foundation:
    path: ../../packages/app_foundation
  design_system:
    path: ../../packages/design_system
  api_client:
    path: ../../packages/api_client

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  testing_support:
    path: ../../packages/testing_support

flutter:
  uses-material-design: true
