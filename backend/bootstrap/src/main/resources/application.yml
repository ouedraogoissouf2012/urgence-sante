spring:
  application:
    name: urgence-sante
  profiles:
    default: local

  # Source de données PostgreSQL/PostGIS. Aucune valeur sensible n'est écrite
  # ici : tout provient de variables d'environnement (mot de passe sans défaut).
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:urgence_sante}
    username: ${DB_USER:urgence_sante}
    password: ${DB_PASSWORD:}

  # Migrations versionnées : Flyway initialise et fait évoluer le schéma.
  flyway:
    enabled: true
    locations: classpath:db/migration

# CORS : aucune origine autorisée par défaut. Liste séparée par des virgules,
# fournie par l'environnement (ex. démo web). Les motifs génériques (« * »)
# sont refusés au démarrage en profil production.
app:
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGINS:}
