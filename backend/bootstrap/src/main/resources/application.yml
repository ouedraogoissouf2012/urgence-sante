spring:
  application:
    name: urgence-sante
  profiles:
    default: local

  # Source de données PostgreSQL/PostGIS. Aucune valeur sensible n'est écrite
  # ici : tout provient de variables d'environnement (mot de passe sans défaut).
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:urgence_sante}
    username: ${DB_USER:urgence_sante}
    password: ${DB_PASSWORD:}

  # Migrations versionnées : Flyway initialise et fait évoluer le schéma.
  flyway:
    enabled: true
    locations: classpath:db/migration

# CORS : aucune origine autorisée par défaut. Liste séparée par des virgules,
# fournie par l'environnement (ex. démo web). Les motifs génériques (« * »)
# sont refusés au démarrage en profil production.
app:
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGINS:}

# Santé et métriques.
# - liveness : le processus est démarré ;
# - readiness : PRÊT à servir — inclut la base de données ;
# - osrm : signalé à part (DEGRADED n'empêche pas de servir : mode dégradé).
management:
  endpoints:
    web:
      exposure:
        include: health, metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-components: always
      # Groupes de santé (chemin exact : management.endpoint.health.group.*).
      group:
        readiness:
          # La readiness inclut la base : une base indisponible la fait tomber.
          include: readinessState,db
          # Composants visibles (db notamment) : un opérateur/un test voit CE
          # QUI rend l'application prête ou non.
          show-components: always

# Corrélation dans chaque ligne de log (X-Correlation-Id propagé ou généré).
logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %5p [${spring.application.name:-},%X{correlationId:-}] %logger{36} : %msg%n"

# ============================================================================
# Profil LOCAL — développement sur le poste, et rien d'autre.
#
# Objectif : `java -jar bootstrap-…-exec.jar` démarre SANS variable
# d'environnement (voir COMMANDES.md à la racine). Chaque valeur reste
# surchargeable par la variable habituelle, et un application-local.yml
# personnel (volontairement NON versionné, voir .gitignore) prime encore
# sur ce bloc. La production n'hérite de rien.
# ============================================================================
---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    # Aligné sur infrastructure/docker-compose.yml + .env.example :
    # PostGIS local exposé sur 55432, mot de passe de développement.
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:55432}/${DB_NAME:urgence_sante}
    password: ${DB_PASSWORD:dev_local_pwd}
  flyway:
    # Ajoute le jeu de données local (15 établissements DEMO) aux migrations :
    # base utilisable dès le démarrage, sans script. `db/local-seed` n'est
    # référencé QUE par ce profil ; en production, DemoDataProductionGuard
    # refuse de toute façon les données DEMO (défense en profondeur).
    locations: classpath:db/migration,classpath:db/local-seed

# Port attendu par les applications Flutter (app_config.dart : localhost:8090)
# et par la documentation locale.
server:
  port: ${SERVER_PORT:8090}

# Le portail Flutter Web tourne sur un port local aléatoire : on autorise
# localhost/127.0.0.1 (motifs interdits en production par CorsPolicy).
app:
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}

# Rayon de recherche élargi : le poste de test peut être loin d'Abidjan (où
# vivent les données DEMO) ; 15 km n'y trouverait rien. Produit : 15 km.
orientation:
  default-radius-meters: ${ORIENTATION_DEFAULT_RADIUS_METERS:100000}
