spring:
  application:
    name: urgence-sante
  profiles:
    default: local

  # Source de données PostgreSQL/PostGIS. Aucune valeur sensible n'est écrite
  # ici : tout provient de variables d'environnement (mot de passe sans défaut).
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:urgence_sante}
    username: ${DB_USER:urgence_sante}
    password: ${DB_PASSWORD:}

  # Migrations versionnées : Flyway initialise et fait évoluer le schéma.
  flyway:
    enabled: true
    locations: classpath:db/migration

# CORS : aucune origine autorisée par défaut. Liste séparée par des virgules,
# fournie par l'environnement (ex. démo web). Les motifs génériques (« * »)
# sont refusés au démarrage en profil production.
app:
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGINS:}

# Santé et métriques.
# - liveness : le processus est démarré ;
# - readiness : PRÊT à servir — inclut la base de données ;
# - osrm : signalé à part (DEGRADED n'empêche pas de servir : mode dégradé).
management:
  endpoints:
    web:
      exposure:
        include: health, metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-components: always
      # Groupes de santé (chemin exact : management.endpoint.health.group.*).
      group:
        readiness:
          # La readiness inclut la base : une base indisponible la fait tomber.
          include: readinessState,db
          # Composants visibles (db notamment) : un opérateur/un test voit CE
          # QUI rend l'application prête ou non.
          show-components: always

# Corrélation dans chaque ligne de log (X-Correlation-Id propagé ou généré).
logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %5p [${spring.application.name:-},%X{correlationId:-}] %logger{36} : %msg%n"

# Documentation d'API — Swagger UI (contract-first).
# La source de vérité est le contrat écrit à la main (docs/api/openapi.yaml),
# copié en ressource statique et servi sur /openapi.yaml. Swagger UI charge CE
# contrat (springdoc.swagger-ui.url) au lieu d'une spec générée depuis le code,
# de sorte que la doc exposée est TOUJOURS identique au contrat officiel.
# NB : api-docs reste actif (springdoc monte son contrôleur Swagger UI à cette
# condition) mais sa spec auto-générée n'est jamais affichée — l'UI pointe le
# contrat statique.
springdoc:
  swagger-ui:
    # Interface accessible sur http://<hôte>/swagger-ui/index.html
    # Charge le contrat statique plutôt qu'une spec auto-générée.
    url: /openapi.yaml
    # Une seule spec (le contrat) : pas de sélecteur d'URL par défaut.
    disable-swagger-default-url: true
