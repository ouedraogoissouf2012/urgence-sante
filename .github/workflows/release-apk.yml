# ============================================================================
# Livraison automatique de l'APK de démonstration.
#
# À chaque évolution de l'application sur main (ou à la demande), ce workflow :
#   1. construit l'APK avec l'URL du serveur public compilée dedans ;
#   2. le publie sur la release GitHub `mvp-demo-apk` (archive canonique) ;
#   3. le dépose sur le VPS — le site https://sante.riqamb.com le sert
#      immédiatement (bouton + QR code).
#
# Tout se passe entre les serveurs de GitHub et le VPS : la connexion du poste
# de développement n'est jamais sollicitée.
# Secret requis : VPS_SSH_KEY (clé privée dédiée, restreinte au dépôt).
# ============================================================================
name: Release APK

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "URL publique de l'API compilée dans l'APK"
        required: true
        default: 'https://sante.riqamb.com/api/v1'
  push:
    branches: [main]
    paths:
      - 'frontend/**'

permissions:
  contents: write # publication sur la release

concurrency:
  group: release-apk
  cancel-in-progress: true

jobs:
  build-publish-deploy:
    name: APK → release → VPS
    runs-on: ubuntu-latest
    env:
      # Vrai si un serveur de dépôt est configuré (absent sur un fork client
      # sans secret) : l'étape de dépôt VPS est alors sautée proprement.
      HAS_VPS_KEY: ${{ secrets.VPS_SSH_KEY != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configurer JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Configurer Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: stable

      - name: Construire l'APK (URL du serveur public compilée)
        working-directory: frontend/apps/patient_mobile
        env:
          # Paramétrable au déclenchement manuel : un déploiement sur un AUTRE
          # domaine (fork client) fournit son URL ; les pushs gardent le défaut.
          API_BASE_URL: ${{ github.event.inputs.api_base_url || 'https://sante.riqamb.com/api/v1' }}
        run: |
          flutter pub get
          flutter build apk --debug -t lib/main_development.dart \
            --dart-define=API_BASE_URL="$API_BASE_URL"

      - name: Publier sur la release mvp-demo-apk
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Un fork n'hérite pas des releases : on la crée si absente.
          gh release view mvp-demo-apk >/dev/null 2>&1 \
            || gh release create mvp-demo-apk --title "APK de démonstration" \
                 --notes "APK Android construit automatiquement par la CI."
          gh release upload mvp-demo-apk \
            frontend/apps/patient_mobile/build/app/outputs/flutter-apk/app-debug.apk \
            --clobber

      - name: Déposer sur le VPS (servi immédiatement par le site)
        # Sauté si le dépôt n'a pas configuré de serveur (fork sans secrets).
        if: ${{ env.HAS_VPS_KEY == 'true' }}
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 194.163.161.169 >> ~/.ssh/known_hosts 2>/dev/null
          scp -i ~/.ssh/deploy_key \
            frontend/apps/patient_mobile/build/app/outputs/flutter-apk/app-debug.apk \
            issouf@194.163.161.169:~/urgence-sante/site/urgence-sante.apk
          echo "APK en ligne sur https://sante.riqamb.com/urgence-sante.apk"
