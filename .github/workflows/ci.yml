name: CI

on:
  push:
    branches: [ main ]
  pull_request:

# Annule les exécutions obsolètes sur une même branche.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — build, tests & gardes d'architecture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurer JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # `verify` exécute la compilation, les tests, la vérification Spring
      # Modulith (frontières, cycles, packages internal) et les règles ArchUnit.
      # REQUIRE_DOCKER_TESTS force l'exécution réelle des tests PostGIS :
      # si Docker/Testcontainers est indisponible, le build ÉCHOUE au lieu
      # d'ignorer silencieusement les tests d'intégration.
      - name: Build, tests et vérification d'architecture
        working-directory: backend
        env:
          REQUIRE_DOCKER_TESTS: 'true'
        run: ./mvnw -B --no-transfer-progress verify

      # Rapport lisible : tests exécutés et ignorés, et preuve qu'un nombre
      # non nul de tests PostGIS a réellement tourné.
      - name: Rapport des tests (exécutés / ignorés)
        if: always()
        working-directory: backend
        run: |
          {
            echo "## Tests backend"
            echo '```'
            grep -h "Tests run:" bootstrap/target/surefire-reports/*.txt \
              modules/*/target/surefire-reports/*.txt \
              architecture-tests/target/surefire-reports/*.txt 2>/dev/null | sort
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          executed=$(grep -h "Tests run:" bootstrap/target/surefire-reports/com.urgencesante.FacilityApiIntegrationTest.txt \
            bootstrap/target/surefire-reports/com.urgencesante.PostgisMigrationIntegrationTests.txt \
            bootstrap/target/surefire-reports/com.urgencesante.ReferentialIntegrityIntegrationTest.txt 2>/dev/null \
            | grep -c "Skipped: 0" || true)
          if [ "$executed" -lt 3 ]; then
            echo "ÉCHEC : des tests d'intégration PostGIS ont été ignorés en CI." | tee -a "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "✓ Tests PostGIS réellement exécutés." >> "$GITHUB_STEP_SUMMARY"

  frontend:
    name: Frontend — analyse & tests Flutter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurer Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: stable

      - name: Résolution des dépendances (workspace)
        working-directory: frontend
        run: flutter pub get

      - name: Analyse statique
        working-directory: frontend
        run: flutter analyze

      - name: Tests
        working-directory: frontend
        run: |
          for member in \
              packages/app_foundation packages/design_system packages/api_client \
              apps/patient_mobile apps/hospital_portal; do
            ( cd "$member" && flutter test )
          done

  contracts:
    name: Contrats — validation OpenAPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Valider le contrat OpenAPI (Redocly)
        run: bash scripts/validate-openapi.sh

  quality-gates:
    name: Qualité — limite de 300 lignes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Contrôle de la limite de 300 lignes par fichier
        run: bash scripts/check-file-length.sh
