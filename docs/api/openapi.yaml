openapi: 3.0.3

info:
  title: Urgence Santé API
  version: 1.0.0
  description: |
    Contrat REST public de l'application Urgence Santé (orientation vers les
    établissements de santé du Grand Abidjan).

    Cette spécification est la **source de vérité** partagée entre le back-end
    Spring Boot et les applications Flutter (client Dart généré). Toute
    évolution incompatible passe par une revue et une nouvelle version.
  contact:
    name: Équipe Urgence Santé

servers:
  - url: /api/v1
    description: Version 1 de l'API (préfixe de versionnement dans le chemin).

tags:
  - name: Facilities
    description: Établissements de santé et recherche géographique.
  - name: MedicalServices
    description: Catalogue des services médicaux.
  - name: Availability
    description: Disponibilité des services par établissement.
  - name: Routing
    description: Itinéraires et temps de trajet.
  - name: Orientation
    description: Recommandation du centre adapté le plus proche.

# Sécurité par défaut : lecture publique en Lot 1. Les opérations authentifiées
# (portail hospitalier, écritures) déclareront « bearerAuth » à leur arrivée.
security: []

paths:
  /facilities:
    get:
      tags: [Facilities]
      operationId: listFacilities
      summary: Lister les établissements de santé
      description: |
        Retourne une page d'établissements. Peut être filtrée par service
        médical et triée par proximité si une position est fournie.
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - name: service
          in: query
          required: false
          description: Filtre sur le code d'un service médical (ex. « maternity »).
          schema:
            type: string
            maxLength: 64
        - name: lat
          in: query
          required: false
          description: Latitude du point de recherche (WGS84). Requiert « lon ».
          schema:
            type: number
            format: double
            minimum: -90
            maximum: 90
        - name: lon
          in: query
          required: false
          description: Longitude du point de recherche (WGS84). Requiert « lat ».
          schema:
            type: number
            format: double
            minimum: -180
            maximum: 180
        - name: radiusMeters
          in: query
          required: false
          description: Rayon de recherche en mètres autour du point fourni.
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100000
      responses:
        '200':
          description: Page d'établissements.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedFacilities'
        '400':
          $ref: '#/components/responses/BadRequest'

  /facilities/{facilityId}:
    get:
      tags: [Facilities]
      operationId: getFacility
      summary: Consulter un établissement
      parameters:
        - name: facilityId
          in: path
          required: true
          description: Identifiant unique de l'établissement.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: L'établissement demandé.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Facility'
        '404':
          $ref: '#/components/responses/NotFound'

  /medical-services:
    get:
      tags: [MedicalServices]
      operationId: listMedicalServices
      summary: Lister le catalogue des services médicaux
      parameters:
        - name: category
          in: query
          required: false
          description: Filtre optionnel sur la catégorie d'un service.
          schema:
            type: string
            maxLength: 64
      responses:
        '200':
          description: Catalogue des services médicaux.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MedicalService'
        '400':
          $ref: '#/components/responses/BadRequest'

  /facilities/{facilityId}/availability:
    get:
      tags: [Availability]
      operationId: getFacilityAvailability
      summary: Consulter la disponibilité des services d'un établissement
      parameters:
        - $ref: '#/components/parameters/FacilityIdParam'
      responses:
        '200':
          description: Disponibilité courante par service.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FacilityAvailability'
        '400':
          $ref: '#/components/responses/BadRequest'

  /facilities/{facilityId}/availability/{serviceCode}:
    put:
      tags: [Availability]
      operationId: updateAvailability
      summary: Mettre à jour le statut d'un service (agent hospitalier)
      description: >-
        Réservé au portail hospitalier authentifié. Nécessite un jeton porteur
        (rôle opérateur de l'établissement visé, ou administrateur). Débit
        limité.
      security:
        - portalBearer: []
      parameters:
        - $ref: '#/components/parameters/FacilityIdParam'
        - name: serviceCode
          in: path
          required: true
          schema:
            type: string
            maxLength: 64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAvailabilityRequest'
      responses:
        '200':
          description: Disponibilité mise à jour.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceAvailability'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Jeton du portail absent ou invalide.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '403':
          description: Agent non autorisé sur cet établissement.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '422':
          description: Le service n'est pas offert par cet établissement.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '429':
          description: Débit dépassé.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /routes:
    get:
      tags: [Routing]
      operationId: getRoute
      summary: Calculer un itinéraire entre deux points
      parameters:
        - name: fromLat
          in: query
          required: true
          schema: { type: number, format: double, minimum: -90, maximum: 90 }
        - name: fromLon
          in: query
          required: true
          schema: { type: number, format: double, minimum: -180, maximum: 180 }
        - name: toLat
          in: query
          required: true
          schema: { type: number, format: double, minimum: -90, maximum: 90 }
        - name: toLon
          in: query
          required: true
          schema: { type: number, format: double, minimum: -180, maximum: 180 }
      responses:
        '200':
          description: Itinéraire calculé.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Route'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /facilities/{facilityId}/availability/{serviceCode}/history:
    get:
      tags: [Availability]
      operationId: getAvailabilityHistory
      summary: Historique des mises à jour de statut d'un service
      parameters:
        - $ref: '#/components/parameters/FacilityIdParam'
        - name: serviceCode
          in: path
          required: true
          schema:
            type: string
            maxLength: 64
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Mises à jour, la plus récente en premier.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AvailabilityHistoryEntry'
        '400':
          $ref: '#/components/responses/BadRequest'

  /orientation:
    get:
      tags: [Orientation]
      operationId: recommendFacilities
      summary: Recommander les centres adaptés pour un besoin médical
      description: >-
        Classe les établissements offrant le service demandé selon la proximité,
        la disponibilité (un statut périmé est traité comme non confirmé) et le
        temps de trajet, avec une explication lisible.
      parameters:
        - name: lat
          in: query
          required: true
          schema: { type: number, format: double, minimum: -90, maximum: 90 }
        - name: lon
          in: query
          required: true
          schema: { type: number, format: double, minimum: -180, maximum: 180 }
        - name: service
          in: query
          required: true
          description: Code du service médical recherché (catalogue).
          schema:
            type: string
            maxLength: 64
        - name: radiusMeters
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100000
            default: 15000
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 20
            default: 5
      responses:
        '200':
          description: Recommandations classées (meilleure en premier).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Recommendation'
        '400':
          $ref: '#/components/responses/BadRequest'

components:
  securitySchemes:
    portalBearer:
      type: http
      scheme: bearer
      description: >-
        Jeton porteur du portail hospitalier. Rôle opérateur (portée sur son
        établissement) ou administrateur (portée globale). N'est requis que
        pour les opérations d'écriture du portail ; les endpoints patient
        restent publics.
  parameters:
    PageParam:
      name: page
      in: query
      required: false
      description: Index de page, à partir de 0.
      schema:
        type: integer
        format: int32
        minimum: 0
        default: 0
    SizeParam:
      name: size
      in: query
      required: false
      description: Taille de page (nombre d'éléments).
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 100
        default: 20
    FacilityIdParam:
      name: facilityId
      in: path
      required: true
      description: Identifiant unique de l'établissement.
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Requête invalide.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    NotFound:
      description: Ressource introuvable.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

  schemas:
    # Convention d'erreurs : RFC 9457 (Problem Details for HTTP APIs).
    Problem:
      type: object
      description: Représentation normalisée d'une erreur (RFC 9457).
      required: [status, title]
      properties:
        type:
          type: string
          format: uri
          description: URI identifiant le type de problème.
          default: about:blank
        title:
          type: string
          description: Résumé court et lisible du type de problème.
        status:
          type: integer
          format: int32
          description: Code de statut HTTP.
        detail:
          type: string
          description: Explication spécifique à cette occurrence.
        instance:
          type: string
          format: uri
          description: URI identifiant l'occurrence du problème.
        errors:
          type: array
          description: Détail des erreurs de validation, le cas échéant.
          items:
            $ref: '#/components/schemas/FieldError'

    FieldError:
      type: object
      required: [field, message]
      properties:
        field:
          type: string
          description: Nom du champ en erreur.
        message:
          type: string
          description: Message de validation associé au champ.

    PageMetadata:
      type: object
      description: Métadonnées de pagination.
      required: [number, size, totalElements, totalPages]
      properties:
        number:
          type: integer
          format: int32
          description: Index de la page courante (à partir de 0).
        size:
          type: integer
          format: int32
          description: Taille de page demandée.
        totalElements:
          type: integer
          format: int64
          description: Nombre total d'éléments disponibles.
        totalPages:
          type: integer
          format: int32
          description: Nombre total de pages.

    GeoPoint:
      type: object
      description: Coordonnées géographiques (WGS84).
      required: [latitude, longitude]
      properties:
        latitude:
          type: number
          format: double
          minimum: -90
          maximum: 90
        longitude:
          type: number
          format: double
          minimum: -180
          maximum: 180

    Facility:
      type: object
      description: Établissement de santé.
      required: [id, name, location, services]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        location:
          $ref: '#/components/schemas/GeoPoint'
        phone:
          type: string
          description: Numéro de contact, au format international.
        services:
          type: array
          description: Codes des services médicaux offerts.
          items:
            type: string
        distanceMeters:
          type: integer
          format: int32
          description: |
            Distance depuis le point de recherche, en mètres. Présent uniquement
            lorsque la requête fournit une position.

    PagedFacilities:
      type: object
      required: [content, page]
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Facility'
        page:
          $ref: '#/components/schemas/PageMetadata'

    MedicalService:
      type: object
      description: Service médical du catalogue.
      required: [code, label]
      properties:
        code:
          type: string
          description: Code unique et stable (ex. « maternity »).
        label:
          type: string
          description: Libellé lisible (ex. « Maternité »).
        category:
          type: string
          description: Catégorie de regroupement (ex. « emergency »).

    AvailabilityStatus:
      type: string
      description: Statut de disponibilité d'un service.
      enum: [AVAILABLE, LIMITED, SATURATED, CLOSED, UNKNOWN]

    Freshness:
      type: string
      description: Fraîcheur de l'information, calculée depuis sa dernière mise à jour.
      enum: [FRESH, AGING, STALE]

    ServiceAvailability:
      type: object
      required: [serviceCode, status, freshness]
      properties:
        serviceCode:
          type: string
        status:
          $ref: '#/components/schemas/AvailabilityStatus'
        freshness:
          $ref: '#/components/schemas/Freshness'
        updatedAt:
          type: string
          format: date-time
          description: Horodatage de la dernière mise à jour (absent si jamais renseigné).

    FacilityAvailability:
      type: object
      required: [facilityId, services]
      properties:
        facilityId:
          type: string
          format: uuid
        services:
          type: array
          items:
            $ref: '#/components/schemas/ServiceAvailability'

    UpdateAvailabilityRequest:
      type: object
      required: [status]
      properties:
        status:
          $ref: '#/components/schemas/AvailabilityStatus'

    AvailabilityHistoryEntry:
      type: object
      description: Mise à jour passée du statut d'un service.
      required: [status, updatedAt]
      properties:
        status:
          $ref: '#/components/schemas/AvailabilityStatus'
        updatedAt:
          type: string
          format: date-time

    Route:
      type: object
      description: Itinéraire entre deux points.
      required: [distanceMeters, durationSeconds]
      properties:
        distanceMeters:
          type: number
          format: double
          description: Distance de l'itinéraire en mètres.
        durationSeconds:
          type: number
          format: double
          description: Durée estimée du trajet en secondes.

    Recommendation:
      type: object
      description: Établissement recommandé pour le besoin exprimé.
      required: [facilityId, name, location, distanceMeters, travelTimeQuality, status, explanation]
      properties:
        facilityId:
          type: string
          format: uuid
        name:
          type: string
        location:
          $ref: '#/components/schemas/GeoPoint'
        phone:
          type: string
          description: Téléphone du centre (absent si inconnu).
        distanceMeters:
          type: number
          format: double
          description: Distance à vol d'oiseau depuis la position du patient.
        travelTimeSeconds:
          type: number
          format: double
          description: Temps de trajet (absent si indisponible).
        travelTimeQuality:
          type: string
          description: >-
            Qualification du temps présenté : REAL (fournisseur d'itinéraires),
            ESTIMATED (estimé depuis la distance, mode dégradé), UNAVAILABLE.
          enum: [REAL, ESTIMATED, UNAVAILABLE]
        status:
          $ref: '#/components/schemas/AvailabilityStatus'
        explanation:
          type: string
          description: Raison lisible de la recommandation.
